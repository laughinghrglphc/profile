<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v6.1.2/css/all.css">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      @keyframes sparkle {
        0% { color: white; }
        25% { color: yellow; }
        50% { color: white; }
        75% { color: yellow; }
        100% { color: white; }
        }
      .sparkle {
        animation: sparkle 2s infinite ease-in-out;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="card">
        <img src="images/1674075425935628.png" alt="actually me irl" class="img-circle">
        <h1>Pablo Davila</h1>
        <h2>Programmer</h2>
        <p class="neon-text">i really really REALLY hate front end</p>
        <a href="https://www.youtube.com/watch?v=6YsNRnZRgg8" target="_blank" class="button-43" role="button">win a free iphone 10!!!!</a>
      </div>


      <div class="card">
        <h3>These links aren't real, dont follow me</h3>
        <ul class="list-inline">
          <a href="https://www.facebook.com" class="icon-link" target="_blank"><i class="fa-brands fa-facebook" style="color: white;"></i></a>
          <a href="https://www.instagram.com" class="icon-link"  target="_blank"><i class="fa-brands fa-instagram" style="color: white;"></i></a>
          <a href="https://www.twitter.com" class="icon-link"  target="_blank"><i class="fa-brands fa-twitter" style="color: white;"></i></a>
        </ul>
      </div>
    </div>
<img
      src="https://media4.giphy.com/media/v1.Y2lkPTZjMDliOTUydWlpdGhudnZma2cxajB4bHJiOTA2dmU0d2luZTE3Nmo2bDdnbDUyeCZlcD12MV9naWZzX3NlYXJjaCZjdD1n/YGIpIZjgxL68w/200w.gif"
      class="dvd-gif"
      id="dvdGif"
      alt="dvd gif"
    />

<img
      src="https://i.pinimg.com/originals/48/c9/52/48c9522aaa31a27582216bec737e92ce.gif"
      class="dvd-gif"
      id="dvdGif2"
      alt="second dvd gif"
    />


<script>
window.onload = () => {

  const gif1 = document.getElementById("dvdGif");
  const gif2 = document.getElementById("dvdGif2");

  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  canvas.style.position = "fixed";
  canvas.style.top = "0";
  canvas.style.left = "0";
  canvas.style.pointerEvents = "none";
  canvas.style.zIndex = "9998";

  document.body.appendChild(canvas);

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  resizeCanvas();

  window.addEventListener("resize", resizeCanvas);

  // Starting positions
  let x1 = 100;
  let y1 = 100;

  let x2 = window.innerWidth - 250;
  let y2 = window.innerHeight - 250;

  // Movement speed
  let dx1 = 2.4;
  let dy1 = 2.1;

  let dx2 = -2.3;
  let dy2 = -2.5;

  // Prevent explosion spam
  let lightningActive = false;

  function drawLightning(xStart, yStart, xEnd, yEnd) {

    ctx.save();

    ctx.strokeStyle = `rgba(0, 255, 255, ${0.7 + Math.random() * 0.3})`;
    ctx.lineWidth = 2 + Math.random() * 2;

    ctx.shadowBlur = 25;
    ctx.shadowColor = "cyan";

    ctx.beginPath();

    ctx.moveTo(xStart, yStart);

    const segments = 16;

    for (let i = 1; i < segments; i++) {

      const t = i / segments;

      const x =
        xStart +
        (xEnd - xStart) * t +
        (Math.random() - 0.5) * 45;

      const y =
        yStart +
        (yEnd - yStart) * t +
        (Math.random() - 0.5) * 45;

      ctx.lineTo(x, y);
    }

    ctx.lineTo(xEnd, yEnd);

    ctx.stroke();

    ctx.restore();
  }

  function drawSparks(xStart, yStart, xEnd, yEnd) {

    for (let i = 0; i < 40; i++) {

      const t = Math.random();

      const x =
        xStart +
        (xEnd - xStart) * t +
        (Math.random() - 0.5) * 60;

      const y =
        yStart +
        (yEnd - yStart) * t +
        (Math.random() - 0.5) * 60;

      const radius = Math.random() * 4 + 1;

      ctx.beginPath();

      ctx.arc(x, y, radius, 0, Math.PI * 2);

      const colors = [
        "rgba(255,255,255,0.9)",
        "rgba(0,255,255,0.9)",
        "rgba(173,216,230,0.9)",
        "rgba(255,255,150,0.9)"
      ];

      ctx.fillStyle =
        colors[Math.floor(Math.random() * colors.length)];

      ctx.shadowBlur = 25;
      ctx.shadowColor = "cyan";

      ctx.fill();
    }

    ctx.shadowBlur = 0;
  }

  function drawExplosion() {

    for (let i = 0; i < 250; i++) {

      const x = Math.random() * canvas.width;
      const y = Math.random() * canvas.height;

      const radius = Math.random() * 6 + 1;

      ctx.beginPath();

      ctx.arc(x, y, radius, 0, Math.PI * 2);

      const colors = [
        "rgba(255,255,255,0.9)",
        "rgba(0,255,255,0.9)",
        "rgba(173,216,230,0.9)",
        "rgba(255,255,150,0.9)"
      ];

      ctx.fillStyle =
        colors[Math.floor(Math.random() * colors.length)];

      ctx.shadowBlur = 30;
      ctx.shadowColor = "cyan";

      ctx.fill();
    }

    ctx.shadowBlur = 0;
  }

  function animate() {

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const w1 = gif1.clientWidth;
    const h1 = gif1.clientHeight;

    const w2 = gif2.clientWidth;
    const h2 = gif2.clientHeight;

    // Move gifs
    x1 += dx1;
    y1 += dy1;

    x2 += dx2;
    y2 += dy2;

    // Bounce gif 1
    if (x1 + w1 >= window.innerWidth || x1 <= 0) {
      dx1 *= -1;
    }

    if (y1 + h1 >= window.innerHeight || y1 <= 0) {
      dy1 *= -1;
    }

    // Bounce gif 2
    if (x2 + w2 >= window.innerWidth || x2 <= 0) {
      dx2 *= -1;
    }

    if (y2 + h2 >= window.innerHeight || y2 <= 0) {
      dy2 *= -1;
    }

    // Apply positions
    gif1.style.left = x1 + "px";
    gif1.style.top = y1 + "px";

    gif2.style.left = x2 + "px";
    gif2.style.top = y2 + "px";

    // Centers
    const centerX1 = x1 + w1 / 2;
    const centerY1 = y1 + h1 / 2;

    const centerX2 = x2 + w2 / 2;
    const centerY2 = y2 + h2 / 2;

    // Distance calculation
    const distance = Math.sqrt(
      (centerX2 - centerX1) ** 2 +
      (centerY2 - centerY1) ** 2
    );

    // Lightning trigger
    if (distance < 260) {

      drawLightning(
        centerX1,
        centerY1,
        centerX2,
        centerY2
      );

      drawLightning(
        centerX1,
        centerY1,
        centerX2,
        centerY2
      );

      drawSparks(
        centerX1,
        centerY1,
        centerX2,
        centerY2
      );

      // Trigger giant explosion ONCE
      if (!lightningActive) {

        lightningActive = true;

        drawExplosion();
      }

    } else {

      // Reset trigger when separated
      lightningActive = false;
    }

    requestAnimationFrame(animate);
  }

  animate();
};
</script>

  </body>

</html>
